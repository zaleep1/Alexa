<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">

<style>
:root{
  --rose-deep:#b3234f;
  --rose:#e0507e;
  --rose-soft:#ffb8d2;
  --blush:#ffe3ee;
  --paper:#fff8f1;
  --paper-line:#f1d9c9;
  --gold:#c9932f;
  --ink:#5a3242;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  min-height:100%;
  font-family:'Cormorant Garamond',serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.5), transparent 40%),
    linear-gradient(160deg, #ffd6e6 0%, #ffc2dc 35%, #f7a8c9 70%, #e888b3 100%);
  background-attachment:fixed;
  overflow-x:hidden;
}

body.has-bg{
  background-image:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.35), transparent 45%),
    url('fondo.jpg');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

#petals{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
}
.petal{
  position:absolute;
  top:-40px;
  font-size:18px;
  opacity:.85;
  animation:fall linear forwards;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.08));
}
@keyframes fall{
  0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
  8%{ opacity:.9; }
  100%{ transform:translateY(110vh) translateX(var(--drift,40px)) rotate(360deg); opacity:0; }
}

#bubbles{ position:fixed; inset:0; pointer-events:none; z-index:0; }
.bubble{
  position:absolute;
  font-family:'Dancing Script',cursive;
  font-weight:700;
  font-size:19px;
  color:var(--rose-deep);
  background:rgba(255,255,255,.75);
  padding:6px 16px;
  border-radius:30px;
  box-shadow:0 6px 16px rgba(179,35,79,.15);
  animation:floatUp 7s forwards;
}
@keyframes floatUp{
  0%{ opacity:0; transform:scale(.6) translateY(0); }
  15%{ opacity:1; transform:scale(1) translateY(-10px); }
  100%{ opacity:0; transform:scale(1) translateY(-140px); }
}

.stage{
  position:relative;
  width:min(420px, 92vw);
  height:min(680px, 90vh);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1;
}

.scene{
  position:relative;
  width:100%;
  height:100%;
  transition:transform 1.3s ease;
}
.scene.lowered{ transform:translateY(70px); }

.envelope{
  position:absolute;
  left:50%;
  bottom:14%;
  transform:translateX(-50%);
  width:100%;
  max-width:340px;
  height:190px;
  z-index:3;
  perspective:1200px;
}

.envelope-back{
  position:absolute;
  inset:0;
  border-radius:14px;
  background:linear-gradient(160deg,#ffd9e9,#ffc0dc);
  box-shadow:0 20px 45px rgba(150,30,70,.35), inset 0 0 0 2px rgba(255,255,255,.5);
  z-index:1;
}

.pocket-front{
  position:absolute;
  left:0; right:0; bottom:0;
  height:28%;
  background:linear-gradient(160deg,#ffcfe2,#f6a0c4);
  border-radius:0 0 14px 14px;
  box-shadow:inset 0 8px 14px rgba(150,20,60,.18);
  z-index:3;
}

.flap{
  position:absolute;
  inset:0;
  background:linear-gradient(160deg,#ffc6dd,#f9a9c8);
  clip-path:polygon(0 0, 100% 0, 50% 68%);
  transform-origin:top center;
  backface-visibility:hidden;
  transition:transform 1.1s ease;
  z-index:4;
  border-radius:14px 14px 0 0;
  box-shadow:0 6px 10px rgba(150,20,60,.12);
}
.envelope.open .flap{
  transform:rotateX(180deg);
}

.seal{
  position:absolute;
  top:26px;
  left:50%;
  transform:translateX(-50%);
  width:62px;
  height:62px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ff8fb3, var(--rose-deep) 70%);
  color:#fff;
  font-size:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 10px 22px rgba(150,20,60,.45), inset 0 0 0 2px rgba(255,255,255,.35);
  z-index:5;
  transition:opacity .5s ease, transform .5s ease;
  animation:pulse 2.2s ease-in-out infinite;
}
.seal:hover{ transform:translateX(-50%) scale(1.06); }
.seal.hide{ opacity:0; transform:translateX(-50%) scale(.5); pointer-events:none; }
@keyframes pulse{
  0%,100%{ box-shadow:0 10px 22px rgba(150,20,60,.45), inset 0 0 0 2px rgba(255,255,255,.35); }
  50%{ box-shadow:0 10px 30px rgba(150,20,60,.65), inset 0 0 0 2px rgba(255,255,255,.5); }
}

.hint{
  position:absolute;
  bottom:2%;
  left:50%;
  transform:translateX(-50%);
  font-size:14px;
  letter-spacing:.06em;
  color:var(--rose-deep);
  opacity:.8;
  z-index:2;
}

.paper{
  position:absolute;
  left:50%;
  bottom:10px;
  transform:translateX(-50%) rotate(-3deg);
  width:90%;
  max-width:300px;
  max-height:0;
  overflow:hidden;
  background:var(--paper);
  border-radius:10px 10px 5px 5px;
  box-shadow:0 22px 44px rgba(120,20,55,.35);
  transition:max-height 1.1s ease, transform 1.1s ease;
  z-index:2;
  border:1px solid var(--paper-line);
}
.paper.show{ transform:translateX(-50%) rotate(0deg); }
.paper.full{ max-height:70vh; }

.paper-inner{
  position:relative;
  padding:30px 22px 76px;
  text-align:center;
}

.corner{
  position:absolute;
  font-size:22px;
  opacity:.9;
}
.corner.tl{ top:10px; left:12px; transform:rotate(-12deg); }
.corner.tr{ top:10px; right:12px; transform:rotate(12deg) scaleX(-1); }
.corner.bl{ bottom:10px; left:12px; transform:rotate(8deg); }
.corner.br{ bottom:10px; right:12px; transform:rotate(-8deg) scaleX(-1); }

.msg-list{
  font-size:19px;
  line-height:1.55;
  color:var(--ink);
  text-align:center;
  cursor:pointer;
}
.msg-line{
  margin:0 0 16px;
  opacity:0;
  transform:translateY(16px);
  animation:revealLine .7s ease forwards;
}
.msg-line:last-child{ margin-bottom:0; }
@keyframes revealLine{
  to{ opacity:1; transform:translateY(0); }
}
.msg-list .accent{
  font-family:'Dancing Script',cursive;
  font-weight:700;
  color:var(--rose-deep);
}

.letter-photo{
  display:block;
  max-width:78%;
  margin:4px auto 18px;
  border-radius:10px;
  border:6px solid #fff;
  box-shadow:0 12px 26px rgba(120,20,55,.28);
  opacity:0;
  animation:revealPhoto .7s ease forwards;
}
@keyframes revealPhoto{
  from{ opacity:0; transform:rotate(-2deg) translateY(14px) scale(.95); }
  to{ opacity:1; transform:rotate(-2deg) translateY(0) scale(1); }
}

.tap-note{
  margin-top:14px;
  font-size:13px;
  color:var(--rose);
  opacity:.75;
  animation:blinkTap 1.6s ease-in-out infinite;
}
@keyframes blinkTap{ 0%,100%{opacity:.35;} 50%{opacity:.9;} }

.unsure{
  margin-top:10px;
  font-family:'Dancing Script',cursive;
  font-size:20px;
  color:var(--rose-deep);
  min-height:20px;
}

.buttons{
  position:relative;
  display:flex;
  gap:14px;
  justify-content:center;
  margin-top:20px;
  min-height:56px;
}

button{
  border:none;
  border-radius:999px;
  padding:11px 26px;
  font-family:'Cormorant Garamond',serif;
  font-weight:600;
  font-size:17px;
  cursor:pointer;
  transition:transform .25s ease, opacity .25s ease, background .25s ease;
}

.btn-yes{
  background:linear-gradient(90deg,#ff6f9c,#e0356f);
  color:#fff;
  box-shadow:0 10px 20px rgba(210,40,90,.35);
}
.btn-no{
  background:#fff;
  border:2px solid var(--rose-soft);
  color:var(--rose-deep);
  position:relative;
}
.btn-no.evasive{
  position:absolute;
}

.final{
  display:none;
  margin-top:6px;
  text-align:left;
  font-size:17px;
  line-height:1.55;
  max-height:42vh;
  overflow-y:auto;
  padding-right:8px;
  scrollbar-width:thin;
}
.final::-webkit-scrollbar{ width:5px; }
.final::-webkit-scrollbar-thumb{ background:var(--rose-soft); border-radius:10px; }
.final b{ color:var(--rose-deep); }

.title-final{
  font-family:'Dancing Script',cursive;
  font-weight:700;
  font-size:28px;
  color:var(--rose-deep);
  text-align:center;
  margin-bottom:10px;
}

#confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:20;
  overflow:hidden;
}
.heart{
  position:absolute;
  top:-30px;
  font-size:20px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{ transform:translateY(0) rotate(0deg); opacity:0; }
  10%{ opacity:1; }
  100%{ transform:translateY(105vh) rotate(320deg); opacity:.9; }
}

@media (prefers-reduced-motion: reduce){
  .petal,.bubble,.heart,.seal{ animation:none !important; }
  .scene,.paper,.flap,.seal{ transition:none !important; }
}
</style>
</head>

<body>

<div id="petals"></div>
<div id="bubbles"></div>
<div id="confetti"></div>

<audio id="music" src="musica.mp3" loop preload="auto"></audio>
<audio id="clickSound" src="click.mp3" preload="none"></audio>

<div class="stage">
  <div class="scene" id="scene">

    <div class="envelope" id="envelope">
      <div class="envelope-back"></div>

      <div class="paper" id="paper">
        <div class="paper-inner">
          <span class="corner tl">🌷</span>
          <span class="corner tr">🌷</span>
          <span class="corner bl">🌷</span>
          <span class="corner br">🌷</span>

          <div class="msg-list" id="msgList">
            <p class="msg-line" id="introLine" style="opacity:1; transform:none; animation:none;">Tap tap💌</p>
          </div>
          <div class="tap-note" id="tapNote" style="display:none;">tap tap</div>
          <div class="unsure" id="unsure"></div>

          <div class="buttons" id="buttons" style="display:none;">
            <button class="btn-yes" id="yesBtn">Sí 💖</button>
            <button class="btn-no" id="noBtn">No</button>
          </div>

          <div class="final" id="final">
            <div class="title-final">Grachas por decir que sí 💕</div>
            <p id="finalText"></p>
          </div>
        </div>
      </div>

      <div class="pocket-front"></div>
      <div class="flap"></div>
      <div class="seal" id="seal">❤️</div>
    </div>

  </div>
  <div class="hint" id="hint"></div>
</div>

<script>
const STEPS = [
  "Sé que llevamos poco tiempo desde que nos conocimos...",
  "Y sé que es demasiado pronto, y probablemente ya lo has notado, pero estos días han sido mejores a tu lado, y por eso <span class=\"accent\">me gustas</span>, y me gustaría decilte",
  "¿Quieres ser mi <span class=\"accent\">novia</span>? 💘"
];

const FINAL_MESSAGE = `
  Desde que te conozco, todo se siente distinto, en el buen sentido<br><br>
  Prometo serte fiel y estar para ti siempre<br><br>
  Grachas por decir que sí<br><br>
  <b>Te quielo mucho. 💖</b>
`;

const FORM_ENDPOINT = "https://formspree.io/f/xpqvarep";

async function enviarRespuesta(respuesta){
  const data = {
    respuesta: respuesta,
    fecha: new Date().toISOString(),
    veces_dijo_no: noCount
  };

  try{ localStorage.setItem("respuesta_carta", JSON.stringify(data)); }catch(e){}

  if(!FORM_ENDPOINT) return;

  try{
    await fetch(FORM_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(data)
    });
  }catch(err){
    console.log("No se pudo enviar la respuesta:", err);
  }
}

function tryLoadBackground(){
  const img = new Image();
  img.onload = ()=> document.body.classList.add("has-bg");
  img.src = "fondo.jpg";
}
tryLoadBackground();

const petalEmojis = ["🌸","🌷","💮","🌺"];
setInterval(()=>{
  const p = document.createElement("div");
  p.className = "petal";
  p.innerText = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  p.style.left = Math.random()*100 + "vw";
  p.style.setProperty("--drift", (Math.random()*80-40)+"px");
  p.style.animationDuration = (6+Math.random()*4)+"s";
  document.getElementById("petals").appendChild(p);
  setTimeout(()=>p.remove(), 11000);
}, 900);

const loveWords = ["te quielo 💕","💘","🌷"];
setInterval(()=>{
  const b = document.createElement("div");
  b.className = "bubble";
  b.innerText = loveWords[Math.floor(Math.random()*loveWords.length)];
  b.style.left = (10+Math.random()*70) + "vw";
  b.style.top = (20+Math.random()*55) + "vh";
  document.getElementById("bubbles").appendChild(b);
  setTimeout(()=>b.remove(), 7000);
}, 2600);

function heartConfetti(count=40){
  const hearts = ["💖","💕","💘","💗","🌷"];
  const layer = document.getElementById("confetti");
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const h = document.createElement("div");
      h.className = "heart";
      h.innerText = hearts[Math.floor(Math.random()*hearts.length)];
      h.style.left = Math.random()*100 + "vw";
      h.style.fontSize = (16+Math.random()*16)+"px";
      h.style.animationDuration = (3+Math.random()*2.5)+"s";
      layer.appendChild(h);
      setTimeout(()=>h.remove(), 6000);
    }, i*60);
  }
}

const clickSound = document.getElementById("clickSound");
function playClick(){
  try{ clickSound.currentTime = 0; clickSound.play(); }catch(e){}
}

const music      = document.getElementById("music");
const seal       = document.getElementById("seal");
const envelope   = document.getElementById("envelope");
const scene      = document.getElementById("scene");
const paper      = document.getElementById("paper");
const paperInner = paper.querySelector(".paper-inner");
const msgList    = document.getElementById("msgList");
const introLine  = document.getElementById("introLine");
const tapNote    = document.getElementById("tapNote");
const unsure     = document.getElementById("unsure");
const buttons    = document.getElementById("buttons");
const yesBtn     = document.getElementById("yesBtn");
const noBtn      = document.getElementById("noBtn");
const final      = document.getElementById("final");
const finalText  = document.getElementById("finalText");
const hint       = document.getElementById("hint");

let step = -1;
let noCount = 0;
const maxNo = 10;

music.volume = 0.6;
window.addEventListener("load", ()=>{
  music.play().catch(()=>{});
});
document.addEventListener("pointerdown", function primerToque(){
  music.play().catch(()=>{});
  document.removeEventListener("pointerdown", primerToque);
}, { once:true });

function growPaper(extra = 26){
  requestAnimationFrame(()=>{
    paper.style.maxHeight = (paperInner.scrollHeight + extra) + "px";
  });
}

function addLine(text){
  const p = document.createElement("p");
  p.className = "msg-line";
  p.innerHTML = text;
  msgList.appendChild(p);
  growPaper();
}

function addPhoto(){
  const img = document.createElement("img");
  img.className = "letter-photo";
  img.id = "letterPhoto";
  img.alt = "";
  img.onload = ()=> growPaper();
  img.onerror = ()=> growPaper();
  msgList.appendChild(img);
  img.src = "foto.png";
  growPaper();
}

function removePhoto(){
  const img = document.getElementById("letterPhoto");
  if(!img) return;
  img.style.transition = "opacity .35s ease, transform .35s ease";
  img.style.opacity = "0";
  img.style.transform = "translateY(-10px) rotate(-2deg) scale(.95)";
  setTimeout(()=>{
    img.remove();
    growPaper();
  }, 360);
}

seal.addEventListener("click", ()=>{
  playClick();
  envelope.classList.add("open");
  scene.classList.add("lowered");
  seal.classList.add("hide");
  music.play().catch(()=>{});

  setTimeout(()=>{
    paper.classList.add("show");
    introLine.remove();
    step = 0;
    addLine(STEPS[0]);
    tapNote.style.display = "block";
  }, 1000);
});

msgList.addEventListener("click", ()=>{
  if(step < 0 || step >= STEPS.length - 1) return;
  playClick();
  step++;
  if(step === 2){ removePhoto(); }
  addLine(STEPS[step]);
  if(step === 1){ addPhoto(); }

  if(step === STEPS.length - 1){
    tapNote.style.display = "none";
    setTimeout(()=>{
      buttons.style.display = "flex";
      growPaper(44);
    }, 550);
  }
});

function mostrarFinal(respuesta){
  buttons.style.display = "none";
  unsure.textContent = "";
  msgList.style.display = "none";
  final.style.display = "block";
  finalText.innerHTML = FINAL_MESSAGE;
  paper.style.maxHeight = "";
  paper.classList.add("full");
  heartConfetti(50);
  enviarRespuesta(respuesta);
}

yesBtn.addEventListener("click", ()=>{
  playClick();
  mostrarFinal("sí");
});

noBtn.addEventListener("click", ()=>{
  playClick();
  noCount++;

  if(noCount >= maxNo){
    mostrarFinal("sí (tras decir no " + noCount + " veces)");
    return;
  }

  if(noCount === 1){
    unsure.textContent = "¿Estás shegura? 🥺";
  } else {
    const phrases = ["¿Shegura, sehgura?","😿","😭","De vdd?","Yo se q si 🤗"];
    unsure.textContent = phrases[Math.min(noCount-2, phrases.length-1)];
  }

  const scale = Math.max(1 - noCount*0.09, 0.32);
  yesBtn.style.transform = `scale(${Math.min(1 + noCount*0.05, 1.8)})`;

  if(noCount >= 2){
    if(!noBtn.classList.contains("evasive")){
      const rect = buttons.getBoundingClientRect();
      const pad = 26;
      buttons.style.minHeight = (rect.height + pad*2) + "px";
      buttons.style.position = "relative";
      noBtn.classList.add("evasive");
      noBtn.style.left = (rect.width/2 - 30) + "px";
      noBtn.style.top = pad + "px";
      growPaper(56);
    }
    const containerRect = buttons.getBoundingClientRect();
    const maxX = Math.max(containerRect.width - 90, 0);
    const maxY = Math.max(containerRect.height - 48, 0);
    noBtn.style.left = (Math.random() * maxX) + "px";
    noBtn.style.top = (Math.random() * maxY) + "px";
  }

  noBtn.style.transform = `scale(${scale})`;
});
</script>

</body>
</html>
